<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Sistemas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🖥️ Monitor de Sistemas</h1>
</header>

<main id="dashboard">
    <section id="cpu-card" class="card">
        <h2>CPU</h2>
        <div class="display"><span class="valor">--%</span></div>
        <p class="status">Status: ---</p>
    </section>

    <section id="ram-card" class="card">
        <h2>RAM</h2>
        <div class="display"><span class="valor">-- GB</span></div>
        <p class="status">Status: ---</p>
    </section>

    <section id="temp-card" class="card">
        <h2>Temperatura</h2>
        <div class="display"><span class="valor">-- °C</span></div>
        <p class="status">Status: ---</p>
    </section>
</main>

<footer>
    <p>© Monitor 🚀</p>
</footer>

<script src="script.js"></script>
</body>
</html>
